services:
  mongo1:
    image: mongo:4.4
    hostname: mongo1
    container_name: mongo1
    command: mongod --replSet ${RS:-rs0} --port ${PORT:-27017} --bind_ip_all
    restart: always
    volumes:
      - ./data/db1:/data/db
    ports:
      - "${PORT:-27017}:${PORT:-27017}"

  mongo2:
    image: mongo:4.4
    hostname: mongo2
    container_name: mongo2
    command: mongod --replSet ${RS:-rs0} --port ${PORT2:-27018} --bind_ip_all
    restart: always
    volumes:
      - ./data/db2:/data/db
    ports:
      - "${PORT2:-27018}:${PORT2:-27018}"

  mongo3:
    image: mongo:4.4
    hostname: mongo3
    container_name: mongo3
    command: mongod --replSet ${RS:-rs0} --port ${PORT3:-27019} --bind_ip_all
    restart: always
    volumes:
      - ./data/db3:/data/db
    ports:
      - "${PORT3:-27019}:${PORT3:-27019}"

  mongo_config:
    image: mongo:4.4
    hostname: rsc
    container_name: rsc
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    command: sh /bin/config
    volumes:
      - ./mongo-config.sh:/bin/config
    environment:
      - RS=${RS:-rs0}
      - HOST=${HOST:-127.0.0.1}
      - PORT=${PORT:-27017}
      - PORT2=${PORT2:-27018}
      - PORT3=${PORT3:-27019}
      - DB_HOST=${DB_HOST:-}
      - USER=${USER:-}
      - PASSWORD=${PASSWORD:-}
      - DB=${DB:-}
      - DBNAME=${DBNAME:-}
